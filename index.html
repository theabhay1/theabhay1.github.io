<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Developer Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- GSAP for advanced scrolling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Lenis Smooth Scrolling (Gold Standard for Awwwards sites) -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    
    <!-- Vanilla Tilt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Glowing Vector Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23ff3300%22>A.</text></svg>">
</head>
<body class="selection:bg-white selection:text-black">

    <div class="noise"></div>
    <div id="ambient-glow"></div>
    <div id="cursor"></div>

    <!-- Cinematic Loader -->
    <div id="preloader">
        <div class="text-xs font-mono uppercase tracking-[0.3em] mb-4 text-gray-400">Loading Experience</div>
        <div id="loader-percent" class="loader-text">0%</div>
    </div>

    <!-- Minimal Sticky Navbar -->
    <nav class="fixed top-0 w-full p-8 flex justify-between items-center z-50 mix-blend-difference">
        <div id="nav-logo" class="text-xl font-bold tracking-tighter"></div>
        <div class="flex gap-8 font-mono text-sm uppercase tracking-widest text-gray-400">
            <a href="#about" class="magnetic hover:text-white transition-colors">About</a>
            <a href="#work" class="magnetic hover:text-white transition-colors">Work</a>
            <a href="#stats" class="magnetic hover:text-white transition-colors">Stats</a>
        </div>
    </nav>

    <!-- Parallax Hero -->
    <main class="w-full">
        <section class="h-[120vh] relative flex flex-col justify-center items-center overflow-hidden">
            <!-- Endless Dense Background Typography -->
            <div id="bg-marquee" class="bg-marquee"></div>

            <div id="hero-title" class="huge-text text-center z-10 flex flex-col">
                <span id="hero-first" class="hero-line block transform translate-y-[20%] opacity-0"></span>
                <span id="hero-last" class="hero-line block outlined-text transform translate-y-[20%] opacity-0"></span>
            </div>
            <div class="absolute bottom-32 right-12 text-right opacity-0 z-10" id="hero-desc">
                <p id="hero-subtitle" class="font-mono uppercase tracking-widest text-xs mb-2 accent-text"></p>
                <div class="max-w-[280px] text-gray-400 text-sm leading-relaxed flex flex-col items-end">
                    <span id="hero-desc-text"></span>
                    <div class="word-carousel font-bold text-white">
                        <div id="hero-carousel" class="word-carousel-inner"></div>
                    </div>
                </div>
            </div>
            <!-- Large background abstract geometric form (subtle) -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] rounded-full border border-white/5 opacity-50 z-0"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] rounded-full border border-white/5 opacity-50 z-0 delay-100"></div>
        </section>

        <!-- Sticky About Section -->
        <section id="about" class="min-h-screen py-32 px-8 md:px-20 grid grid-cols-1 lg:grid-cols-2 gap-20 items-center relative z-10 bg-black">
            <div class="flex justify-center">
                <div class="w-full max-w-md aspect-[3/4] img-reveal">
                    <img src="profile.png" alt="Profile Vector" class="w-full h-full object-cover">
                </div>
            </div>
            <div>
                <h2 id="about-headline" class="text-5xl md:text-7xl font-bold mb-10 tracking-tight leading-none js-split-text"></h2>
                <p id="about-desc" class="text-xl text-gray-400 font-light mb-8 max-w-xl leading-relaxed"></p>
                <div id="skills-container" class="flex flex-wrap gap-4 mt-12"></div>
            </div>
        </section>

        <!-- Horizontal Scroll Work Section -->
        <section id="work" class="horizontal-scroll-wrapper relative">
            <div class="absolute top-12 left-12 z-10 text-8xl font-black outlined-text opacity-20 pointer-events-none">SELECTED WORK</div>
            
            <div id="project-container" class="horizontal-scroll-container flex">
                <!-- Data securely injected by app.js based on data.js to maintain flawless GSAP Scroll boundaries -->
            </div>
        </section>

        <!-- Minimal Stats Section -->
        <section id="stats" class="py-40 px-8 text-center bg-[#070707]">
            <h2 class="text-sm font-mono tracking-[0.5em] text-gray-500 uppercase mb-20 drop-shadow-lg">Performance Metrics</h2>
            
            <div id="stats-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto"></div>
            
            <div class="mt-40">
                <a id="contact-email" href="" class="magnetic text-5xl md:text-8xl font-black hover:text-accent transition-colors">START A PROJECT</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-12 px-8 flex flex-col md:flex-row justify-between items-center border-t border-white/10">
        <p id="footer-copyright" class="font-mono text-xs text-gray-500"></p>
        <div class="flex gap-8 mt-6 md:mt-0">
            <a id="footer-github" href="" target="_blank" class="magnetic text-gray-400 hover:text-white"><i data-lucide="github"></i></a>
            <a id="footer-linkedin" href="" target="_blank" class="magnetic text-gray-400 hover:text-white"><i data-lucide="linkedin"></i></a>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
